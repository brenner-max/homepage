<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR-Code bremos.org</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  body { font-family: 'Inter', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #08080a; }
  h1 { color: #f5c842; margin-bottom: 0.3rem; }
  p { color: #9a9590; margin-bottom: 2rem; }
  #qrcode { background: #ffffff; padding: 24px; border-radius: 16px; box-shadow: 0 0 30px rgba(245,200,66,.2); }
  #qrcode canvas, #qrcode img { display: block; }
  .url-label { margin-top: 1.5rem; font-size: 1rem; color: #f5c842; font-weight: bold; letter-spacing: 0.05em; }
  .btn { margin-top: 2rem; padding: 0.8rem 2rem; background: linear-gradient(135deg, #f5c842, #ff784f); color: #08080a; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
  .btn:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(245,200,66,.3); }
  .info { margin-top: 1rem; font-size: 0.85rem; color: #6e6a62; }
</style>
</head>
<body>
  <h1>QR-Code — bremos.org</h1>
  <p>Visitenkarten-tauglich · 800×800 px · Hochauflösend</p>
  <div id="qrcode"></div>
  <div class="url-label">bremos.org</div>
  <button class="btn" onclick="downloadPNG()">⬇ PNG herunterladen (druckfertig)</button>
  <p class="info">Empfehlung: mindestens 2×2 cm auf der Visitenkarte · PNG ist druckfertig bei 800px</p>

  <script>
    const qr = new QRCode(document.getElementById("qrcode"), {
      text: "https://bremos.org",
      width: 800,
      height: 800,
      colorDark: "#08080a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadPNG() {
      setTimeout(() => {
        const canvas = document.querySelector("#qrcode canvas");
        const link = document.createElement("a");
        link.download = "qrcode-bremos-org.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }, 100);
    }
  </script>
</body>
</html>
